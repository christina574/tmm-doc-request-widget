<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Document Request</title>
<script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: #f5f6f8;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e8eaed;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon {
    width: 32px; height: 32px;
    background: #e8f0fe;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-icon svg { width: 18px; height: 18px; stroke: #1a73e8; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .header-sub { font-size: 12px; color: #6b7280; margin-top: 1px; }

  .loading {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #6b7280;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #e8eaed; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin: 20px; padding: 14px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; color: #dc2626; font-size: 13px; display: none;
  }

  .content { flex: 1; overflow-y: auto; padding: 16px 20px; display: none; }

  .section { margin-bottom: 20px; }
  .section-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
    color: #6b7280; margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid #e8eaed;
  }
  .section-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-auto { background: #1a73e8; }
  .dot-cond { background: #f59e0b; }
  .dot-extra { background: #9ca3af; }

  .doc-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 10px; border-radius: 7px; margin-bottom: 3px;
    cursor: pointer; transition: background 0.12s;
    border: 1px solid transparent;
  }
  .doc-item:hover { background: #f0f4ff; border-color: #dbeafe; }
  .doc-item.checked { background: #f0f9ff; border-color: #bae6fd; }

  .doc-item input[type="checkbox"] {
    width: 16px; height: 16px; margin-top: 1px; flex-shrink: 0;
    accent-color: #1a73e8; cursor: pointer;
  }
  .doc-text { flex: 1; }
  .doc-name { font-size: 13px; font-weight: 500; color: #1a1a2e; line-height: 1.4; }
  .doc-hint { font-size: 11px; color: #6b7280; margin-top: 1px; }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 6px;
    border-radius: 99px; margin-left: 5px; vertical-align: middle;
  }
  .badge-auto { background: #dbeafe; color: #1d4ed8; }
  .badge-cond { background: #fef3c7; color: #92400e; }

  .footer {
    background: #fff; border-top: 1px solid #e8eaed;
    padding: 12px 20px; display: none;
    align-items: center; justify-content: space-between; gap: 12px;
  }
  .footer-count { font-size: 13px; color: #6b7280; }
  .footer-count strong { color: #1a1a2e; }
  .btn-row { display: flex; gap: 8px; }

  button {
    border-radius: 7px; padding: 8px 16px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid #d1d5db; transition: all 0.1s;
  }
  .btn-cancel { background: #fff; color: #374151; }
  .btn-cancel:hover { background: #f9fafb; }
  .btn-generate {
    background: #1a73e8; color: #fff; border-color: #1a73e8;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-generate:hover { background: #1557b0; border-color: #1557b0; }
  .btn-generate:disabled { background: #9ca3af; border-color: #9ca3af; cursor: not-allowed; }
  .btn-generate svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M7 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-1"/><rect x="9" y="1" width="6" height="4" rx="1"/><path d="m9 12 1 1 3-3"/></svg>
  </div>
  <div>
    <div class="header-title">Document request</div>
    <div class="header-sub" id="deal-label">Loading deal info...</div>
  </div>
</div>

<div class="loading" id="loading-state">
  <div class="spinner"></div>
  <span>Loading borrower information...</span>
</div>

<div class="error-box" id="error-box"></div>

<div class="content" id="main-content">
  <div id="sections-container"></div>
</div>

<div class="footer" id="footer">
  <div class="footer-count"><strong id="count-num">0</strong> <span id="count-label">documents selected</span></div>
  <div class="btn-row">
    <button class="btn-cancel" onclick="ZOHO.embeddedApp.close()">Cancel</button>
    <button class="btn-generate" id="generate-btn" onclick="generateRequests()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Generate requests
    </button>
  </div>
</div>

<script>
var dealId = null;
var allDocs = [];

ZOHO.embeddedApp.on("PageLoad", function(data) {
  dealId = data.EntityId;
  loadDealData(dealId);
});

ZOHO.embeddedApp.init();

function showError(msg) {
  document.getElementById("loading-state").style.display = "none";
  var eb = document.getElementById("error-box");
  eb.style.display = "block";
  eb.textContent = msg;
}

function loadDealData(dealId) {
  ZOHO.CRM.API.getRecord({ Entity: "Deals", RecordID: dealId })
    .then(function(dealResp) {
      var deal = dealResp.data[0];
      if (!deal) { showError("Could not load deal record."); return; }

      var dealName = deal.Deal_Name || "This Deal";
      var giftLetterRequired = (deal.TMM_Gift_Letter_Required || "").toLowerCase() === "yes";
      var contactObj = deal.Contact_Name;

      if (!contactObj) { showError("No primary borrower attached to this deal."); return; }

      var primaryContactId = contactObj.id;

      // Load primary borrower
      ZOHO.CRM.API.getRecord({ Entity: "Contacts", RecordID: primaryContactId })
        .then(function(contactResp) {
          var primaryContact = contactResp.data[0];
          if (!primaryContact) { showError("Could not load borrower record."); return; }

          var primaryFirstName = primaryContact.First_Name || "Borrower";
          var primarySelfEmployed = (primaryContact.TMM_Self_employed || "") === "Yes";
          var maritalStatus = (primaryContact.TMM_Marital_Status || "").toLowerCase();
          var isDivorced = maritalStatus === "divorced" || maritalStatus === "separated";

          // Try to load co-borrowers via related list
          ZOHO.CRM.API.getAllRecords({ Entity: "Deals", RecordID: dealId, RelatedList: "Contacts" })
            .then(function(relResp) {
              var allContacts = (relResp.data || []);
              var coBorrowers = allContacts.filter(function(c) { return c.id != primaryContactId; });

              buildChecklist(deal, dealName, primaryContact, primaryFirstName, primarySelfEmployed, isDivorced, giftLetterRequired, coBorrowers);
            })
            .catch(function() {
              // No co-borrowers or error, continue with just primary
              buildChecklist(deal, dealName, primaryContact, primaryFirstName, primarySelfEmployed, isDivorced, giftLetterRequired, []);
            });
        })
        .catch(function(e) { showError("Error loading borrower: " + JSON.stringify(e)); });
    })
    .catch(function(e) { showError("Error loading deal: " + JSON.stringify(e)); });
}

function buildChecklist(deal, dealName, primaryContact, primaryFirstName, primarySelfEmployed, isDivorced, giftLetterRequired, coBorrowers) {
  document.getElementById("deal-label").textContent = dealName;

  var hasCoborrower = coBorrowers.length > 0;
  var primarySuffix = hasCoborrower ? " (" + primaryFirstName + ")" : "";

  allDocs = [];

  // --- Primary borrower docs ---
  var primaryDocs = [];
  primaryDocs.push({ id: "photo_id_primary", label: "Photo ID" + primarySuffix, hint: "Government-issued photo identification", checked: true, type: "auto", borrowerId: primaryContact.id, borrowerSuffix: primarySuffix });
  primaryDocs.push({ id: "bank_stmt_primary", label: "90-day bank statements" + primarySuffix, hint: "All accounts, most recent 90 days", checked: true, type: "auto", borrowerId: primaryContact.id, borrowerSuffix: primarySuffix });

  if (primarySelfEmployed) {
    primaryDocs.push({ id: "selfempl_primary", label: "2 years T1 generals & NOAs" + primarySuffix, hint: "Self-employed income verification", checked: true, type: "auto", borrowerId: primaryContact.id, borrowerSuffix: primarySuffix, docType: "self_employed" });
  } else {
    primaryDocs.push({ id: "employment_primary", label: "Job letter & recent paystub" + primarySuffix, hint: "Employment verification", checked: true, type: "auto", borrowerId: primaryContact.id, borrowerSuffix: primarySuffix, docType: "employed" });
  }

  allDocs.push({ sectionTitle: "Primary borrower", dotClass: "dot-auto", docs: primaryDocs });

  // --- Co-borrower docs ---
  coBorrowers.forEach(function(cb, idx) {
    var cbFirstName = cb.First_Name || ("Co-borrower " + (idx + 1));
    var cbSuffix = " (" + cbFirstName + ")";
    var cbSelfEmployed = (cb.TMM_Self_employed || "") === "Yes";
    var cbDocs = [];

    cbDocs.push({ id: "photo_id_co_" + cb.id, label: "Photo ID" + cbSuffix, hint: "Government-issued photo identification", checked: true, type: "auto", borrowerId: cb.id, borrowerSuffix: cbSuffix });
    cbDocs.push({ id: "bank_stmt_co_" + cb.id, label: "90-day bank statements" + cbSuffix, hint: "All accounts, most recent 90 days", checked: true, type: "auto", borrowerId: cb.id, borrowerSuffix: cbSuffix });

    if (cbSelfEmployed) {
      cbDocs.push({ id: "selfempl_co_" + cb.id, label: "2 years T1 generals & NOAs" + cbSuffix, hint: "Self-employed income verification", checked: true, type: "auto", borrowerId: cb.id, borrowerSuffix: cbSuffix, docType: "self_employed" });
    } else {
      cbDocs.push({ id: "employment_co_" + cb.id, label: "Job letter & recent paystub" + cbSuffix, hint: "Employment verification", checked: true, type: "auto", borrowerId: cb.id, borrowerSuffix: cbSuffix, docType: "employed" });
    }

    allDocs.push({ sectionTitle: "Co-borrower: " + cbFirstName, dotClass: "dot-auto", docs: cbDocs });
  });

  // --- Conditional docs ---
  var condDocs = [];
  condDocs.push({
    id: "gift_letter",
    label: "Gift letter",
    hint: "Required for gifted down payment",
    checked: giftLetterRequired,
    type: "cond",
    condReason: giftLetterRequired ? "Gift Letter Required = Yes" : null
  });
  condDocs.push({
    id: "divorce_agreement",
    label: "Divorce / separation agreement",
    hint: "Required based on marital status",
    checked: isDivorced,
    type: "cond",
    condReason: isDivorced ? "Marital status: " + primaryContact.TMM_Marital_Status : null
  });

  allDocs.push({ sectionTitle: "Conditional documents", dotClass: "dot-cond", docs: condDocs });

  renderChecklist();
}

function renderChecklist() {
  var container = document.getElementById("sections-container");
  container.innerHTML = "";

  allDocs.forEach(function(section, si) {
    var sDiv = document.createElement("div");
    sDiv.className = "section";

    var header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = '<span class="section-dot ' + section.dotClass + '"></span>' + escHtml(section.sectionTitle);
    sDiv.appendChild(header);

    section.docs.forEach(function(doc, di) {
      var item = document.createElement("div");
      item.className = "doc-item" + (doc.checked ? " checked" : "");
      item.setAttribute("data-si", si);
      item.setAttribute("data-di", di);

      var badge = doc.type === "auto" ? '<span class="badge badge-auto">auto</span>' : (doc.condReason ? '<span class="badge badge-cond" title="' + escHtml(doc.condReason) + '">conditional</span>' : '');

      item.innerHTML =
        '<input type="checkbox" id="chk_' + si + '_' + di + '"' + (doc.checked ? ' checked' : '') + '>' +
        '<div class="doc-text">' +
          '<div class="doc-name">' + escHtml(doc.label) + badge + '</div>' +
          (doc.hint ? '<div class="doc-hint">' + escHtml(doc.hint) + '</div>' : '') +
        '</div>';

      item.addEventListener("click", function(e) {
        if (e.target.tagName !== "INPUT") {
          var chk = item.querySelector("input");
          chk.checked = !chk.checked;
          chk.dispatchEvent(new Event("change"));
        }
      });

      item.querySelector("input").addEventListener("change", function() {
        allDocs[si].docs[di].checked = this.checked;
        item.classList.toggle("checked", this.checked);
        updateCount();
      });

      sDiv.appendChild(item);
    });

    container.appendChild(sDiv);
  });

  document.getElementById("loading-state").style.display = "none";
  document.getElementById("main-content").style.display = "block";
  document.getElementById("footer").style.display = "flex";
  updateCount();
}

function updateCount() {
  var total = 0;
  allDocs.forEach(function(s) { s.docs.forEach(function(d) { if (d.checked) total++; }); });
  document.getElementById("count-num").textContent = total;
  document.getElementById("count-label").textContent = total === 1 ? "document selected" : "documents selected";
  document.getElementById("generate-btn").disabled = total === 0;
}

function generateRequests() {
  var selected = [];
  allDocs.forEach(function(s) {
    s.docs.forEach(function(d) {
      if (d.checked) selected.push(d);
    });
  });

  if (selected.length === 0) return;

  document.getElementById("generate-btn").disabled = true;
  document.getElementById("generate-btn").innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0"/></svg> Generating...';

  var selectedJson = JSON.stringify(selected.map(function(d) {
    return { id: d.id, label: d.label, borrowerId: d.borrowerId || "", borrowerSuffix: d.borrowerSuffix || "", docType: d.docType || "" };
  }));

  ZOHO.CRM.API.invokeFunction({
    apiname: "TMM_Doc_Request_From_Widget",
    arguments: { dealId: dealId, selectedDocs: selectedJson }
  }).then(function(resp) {
    ZOHO.embeddedApp.close();
  }).catch(function(e) {
    alert("Error generating requests: " + JSON.stringify(e));
    document.getElementById("generate-btn").disabled = false;
    document.getElementById("generate-btn").innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Generate requests';
  });
}

function escHtml(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
